title:               steffen novak mollestad
description:         a place for where thoughts turns into writing
author:              steffenmoll

url:                 "https://steffenmoll.github.io"
baseurl:             "/writing"

include:             ['_pages']
exclude:             ['_includes/notes_graph.json', 'starting-point.md', 'docs', 'README.md', 'Gemfile', 'Gemfile.lock']

# If you are using a host that cannot resolve URLs that do
# not end with .html (such as Neocities), set this to 'true'.
use_html_extension:  false

# Set to `true` to open non-internal links in new tabs, or
# set to `false` to open non-internal links in current tab.
open_external_links_in_new_tab: true

# Set to `true` to replace tweet URLs with Twitter embeds.
# Note that doing so will negatively affect the reader's privacy
# as their browser will communicate with Twitter's servers.
embed_tweets: false

# Set to `true` to show the "Notes mentioning this note" backlinks section.
show_backlinks: false

# Set to `true` to show the interactive notes graph visualization.
show_notes_graph: false

permalink:           pretty
relative_permalinks: false

sass:
  sass_dir:          _sass
  style:            :compressed

collections:
  notes:
    output: true
    permalink: /:slug

defaults:
  - scope:
      path: "**/*"
    values:
      layout: "default"
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: "note"
